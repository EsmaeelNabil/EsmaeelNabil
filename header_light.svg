<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#f0ece4"/>
    </linearGradient>
    <linearGradient id="amberDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c8bfae" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="subtleShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#c8b89a" flood-opacity="0.3"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.8" fill="#c8bfae" opacity="0.6"/>
    </pattern>
    <pattern id="crosshatch" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 40 L 40 0" stroke="#ddd8ce" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1400" height="650" fill="url(#bg)"/>
