  <rect x="88" y="7" width="210" height="24" rx="4" fill="#0c1225"/>
  <text x="193" y="23.5" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="11" fill="#3d5473" text-anchor="middle">esmaeel@dev — ~/portfolio</text>
  <!-- Window controls right -->
  <text x="1388" y="23" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="12" fill="#1e3a5f" text-anchor="end">— □ ×</text>

  <!-- LEFT AMBER ACCENT STRIP -->
  <rect x="0" y="38" width="4" height="612" fill="url(#amber)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- BACKGROUND DECORATION: large faded bracket -->
  <text x="560" y="560" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="520" fill="#0d1930" font-weight="bold">}</text>

