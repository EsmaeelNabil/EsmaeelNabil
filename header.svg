<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060912"/>
      <stop offset="100%" stop-color="#0c1225"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b8c8d8"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#1e3a5f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chipGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.7" fill="#1e3a5f" opacity="0.5"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1400" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1400" height="1" fill="#000000" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1400" height="650" fill="url(#bg)"/>
  <rect width="1400" height="650" fill="url(#dots)"/>
  <rect width="1400" height="650" fill="url(#scanlines)"/>

  <!-- TERMINAL CHROME BAR -->
  <rect x="0" y="0" width="1400" height="38" fill="#080c1a"/>
  <line x1="0" y1="38" x2="1400" y2="38" stroke="#1a2d4a" stroke-width="1"/>
  <!-- Traffic lights -->
  <circle cx="22" cy="19" r="6.5" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="6.5" fill="#ffbd2e"/>
  <circle cx="66" cy="19" r="6.5" fill="#28c840"/>
