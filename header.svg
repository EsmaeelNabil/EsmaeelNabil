  <polygon points="1260,38 1400,38 1400,612 1330,612" fill="#07091a" opacity="0.7"/>
  <line x1="1260" y1="38" x2="1330" y2="612" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>

  <!-- ========================== LEFT COLUMN ========================== -->

  <!-- ESMAEEL -->
  <text x="26" y="168" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="90" fill="url(#nameGrad)" font-weight="bold" letter-spacing="-2">
    ESMAEEL
    <animate attributeName="opacity" values="0;0;1" dur="1s" fill="freeze"/>
