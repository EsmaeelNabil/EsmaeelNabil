  <text x="28" y="358" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="15" fill="#22c55e" font-weight="bold">❯</text>
  <text x="50" y="358" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="15" fill="#e2e8f0">"Aiming to learn everything I can 🎯"</text>

  <!-- Prompt 2 -->
  <text x="28" y="392" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="15" fill="#22c55e" font-weight="bold">❯</text>
  <text x="50" y="392" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="15" fill="#4a6080">2026: More open source contributions ↑</text>

  <!-- Prompt 3 -->
  <text x="28" y="426" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="15" fill="#22c55e" font-weight="bold">❯</text>
  <text x="50" y="426" font-family="'SF Mono','Fira Code','Cascadia Code','Courier New',monospace" font-size="15" fill="#4a6080">Always open for collaboration</text>

